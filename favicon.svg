<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1E3150"/>
    </linearGradient>
    <linearGradient id="peak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#B8D4F0"/>
      <stop offset="100%" stop-color="#4A7DB5"/>
    </linearGradient>
    <linearGradient id="gold-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#E8C96A"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Mountain peak -->
  <path d="M32 12 L52 46 L12 46 Z" fill="url(#peak)" opacity="0.9"/>
  <!-- Second peak behind -->
  <path d="M42 18 L58 46 L36 46 Z" fill="#4A7DB5" opacity="0.4"/>
  <!-- Snow cap detail -->
  <path d="M32 12 L38 24 L32 21 L26 24 Z" fill="#FFFFFF"/>
  <!-- Star (observatory nod) -->
  <circle cx="18" cy="18" r="2" fill="url(#gold-accent)"/>
  <circle cx="18" cy="18" r="4" fill="url(#gold-accent)" opacity="0.2"/>
</svg>
